<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<!-- ===== HEAD FRAGMENT ===== -->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | 가계부'">가계부</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar {
            position: fixed; top: 56px; bottom: 0; left: 0;
            width: 200px; z-index: 100; overflow-y: auto;
            background: #fff; border-right: 1px solid #e9ecef;
            padding: 1rem 0.75rem;
        }
        .sidebar .nav-link {
            color: #495057; border-radius: 8px;
            padding: 0.5rem 0.75rem; margin-bottom: 2px;
            font-size: 0.9rem;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background-color: #e8f0fe; color: #0d6efd; font-weight: 500;
        }
        .main-content { margin-left: 200px; padding: 1.5rem; }
        @media (max-width: 768px) { .main-content { margin-left: 0; } }
        .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .amount { font-weight: 700; }
    </style>
</head>

<!-- ===== NAVBAR FRAGMENT ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-md navbar-dark bg-primary sticky-top" style="height:56px">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-wallet2 me-1"></i> 가계부
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mobileNav">
            <ul class="navbar-nav ms-auto d-md-none">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>대시보드</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/manual}"><i class="bi bi-phone me-1"></i>SMS 수동 입력</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/transactions}"><i class="bi bi-list me-1"></i>거래내역</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/transactions/new}"><i class="bi bi-plus-circle me-1"></i>직접 입력</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/stats}"><i class="bi bi-bar-chart me-1"></i>통계</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- ===== SIDEBAR FRAGMENT ===== -->
<nav th:fragment="sidebar" class="sidebar d-none d-md-block">
    <ul class="nav flex-column">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/}">
                <i class="bi bi-house-door me-2"></i>대시보드
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/manual}">
                <i class="bi bi-phone me-2"></i>SMS 수동 입력
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/transactions}">
                <i class="bi bi-list-ul me-2"></i>거래내역
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/transactions/new}">
                <i class="bi bi-plus-circle me-2"></i>직접 입력
            </a>
        </li>
        <hr>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/stats}">
                <i class="bi bi-bar-chart-line me-2"></i>통계
            </a>
        </li>
    </ul>
</nav>

<!-- ===== SCRIPTS FRAGMENT ===== -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</div>

</html>
