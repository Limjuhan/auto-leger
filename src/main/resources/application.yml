spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/ledger_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update        # 첫 실행 시 create → 이후 update 유지
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true  # data.sql이 JPA 테이블 생성 후 실행되도록

  sql:
    init:
      mode: always             # data.sql 항상 실행 (INSERT IGNORE라 중복 없음)

  thymeleaf:
    cache: false               # 개발용: HTML 수정 즉시 반영 (devtools가 자동 설정하지만 명시)

server:
  port: 8080

# SMS 자동화 API 인증키 (MacroDroid에서 이 키를 같이 전송)
ledger:
  api-key: ${LEDGER_API_KEY:my-secret-key-1234}   # 로컬 기본값, 배포 시 환경변수로 교체
